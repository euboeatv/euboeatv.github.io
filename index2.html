<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euboean TV - Hybrid Edition (fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           BASE STYLES & CRT OVERLAY
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050505; color: #fff;
            overflow: hidden; height: 100vh;
        }
        body::after {
            content: ""; display: block; position: fixed; inset: 0;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.015), rgba(0,0,255,0.04));
            background-size: 100% 2px, 3px 100%;
            z-index: 3; pointer-events: none;
        }

        /* ==========================================================================
           DEBUG CONSOLE
           ========================================================================== */
        #debug-console {
            position: fixed; top: 15px; left: 15px;
            width: 420px; max-height: 290px;
            background: rgba(0,0,0,0.93); border: 1px solid #ff3b30;
            border-radius: 10px; z-index: 500;
            font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 20px rgba(255,59,48,0.2);
            transition: max-height 0.2s ease;
        }
        #debug-console.collapsed { max-height: 30px; overflow: hidden; }
        #dbg-hdr {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; background: #ff3b30; color: #fff;
            font-weight: bold; font-size: 0.65rem; letter-spacing: 2px;
            cursor: pointer; user-select: none; flex-shrink: 0;
            border-radius: 9px 9px 0 0;
        }
        #debug-console.collapsed #dbg-hdr { border-radius: 9px; }
        #dbg-hint { font-weight: normal; font-size: 0.6rem; opacity: 0.85; }
        #dbg-body { overflow-y: auto; flex: 1; padding: 5px 8px; }
        #dbg-body::-webkit-scrollbar { width: 3px; }
        #dbg-body::-webkit-scrollbar-thumb { background: #333; }
        .dl { display: flex; gap: 6px; padding: 2px 0; border-bottom: 1px solid #0d0d0d; line-height: 1.4; }
        .dl .dt  { color: #444; min-width: 52px; flex-shrink: 0; }
        .dl.info  .dm { color: #32d74b; }
        .dl.warn  .dm { color: #ffd60a; }
        .dl.error .dm { color: #ff3b30; }
        .dl.event .dm { color: #0a84ff; }

        /* ==========================================================================
           NEWS TICKER
           ========================================================================== */
        .newsBarContainer {
            position: fixed; bottom: 0; left: 0;
            width: 100%; height: 45px; background: #0a0a0a;
            border-top: 2px solid #ff3b30; z-index: 10;
            overflow: hidden; display: flex; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.8);
        }
        .ticker-label {
            background: #ff3b30; color: white; height: 100%; padding: 0 18px;
            display: flex; align-items: center; font-weight: bold; z-index: 11;
            text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap; flex-shrink: 0;
        }
        .ticker-track { flex: 1; overflow: hidden; }
        #newsScroller {
            display: inline-flex; white-space: nowrap;
            animation: scrollNews 80s linear infinite;
            animation-play-state: paused;
        }
        @keyframes scrollNews {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ==========================================================================
           PLAYER & BRANDING
           ========================================================================== */
        .player-container { position: fixed; inset: 0; z-index: 1; }
        #player-mount { width: 100vw; height: 100vh; background: #000; position: relative; }

        #player-mount iframe,
        #player-mount > div {
            position: absolute; inset: 0;
            width: 100%; height: 100%; border: none;
        }

        #transition-overlay {
            position: fixed; inset: 0; background: #000;
            opacity: 0; transition: opacity 0.4s ease;
            z-index: 12; pointer-events: none;
        }

        .branding {
            position: fixed; top: 22px; left: 40px; z-index: 20;
            display: flex; align-items: center; gap: 10px; transition: opacity 0.5s;
        }
        .live-dot {
            width: 9px; height: 9px; background: #ff3b30;
            border-radius: 50%; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,59,48,0.7); }
            70%  { box-shadow: 0 0 0 10px rgba(255,59,48,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
        }
        .branding h3 {
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.4rem;
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }

        #video-status {
            position: fixed; bottom: 60px; left: 40px; z-index: 20;
            font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
            color: #32d74b; text-shadow: 0 0 6px rgba(50,215,75,0.5);
            pointer-events: none;
        }

        /* ==========================================================================
           REMOTE CONTROL
           ========================================================================== */
        #remote-control {
            position: fixed; top: 50%; right: 30px; transform: translateY(-50%);
            width: 255px; background: #1c1c1e;
            border: 1px solid #333; border-radius: 24px; padding: 18px; z-index: 25;
            box-shadow: -10px 10px 30px rgba(0,0,0,0.8),
                        inset 2px 2px 5px rgba(255,255,255,0.04);
            transition: opacity 0.5s ease, transform 0.3s ease;
        }
        .ui-faded #remote-control { opacity: 0; transform: translateY(-50%) translateX(20px); pointer-events: none; }
        .ui-faded .branding { opacity: 0.15; }
        .remote-header {
            text-align: center; font-size: 0.7rem; color: #555;
            margin-bottom: 14px; letter-spacing: 3px; text-transform: uppercase;
        }
        .remote-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 16px; }
        .remote-controls button {
            background: #2c2c2e; border: none; color: #e5e5ea;
            padding: 13px 0; border-radius: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 0 #151515, inset 0 1px 1px rgba(255,255,255,0.08);
            transition: all 0.1s;
        }
        .remote-controls button:active { transform: translateY(4px); box-shadow: 0 0 0 #151515; }
        .btn-ch  { background: #3a3a3c !important; }
        .btn-2   { grid-column: span 2; }
        .btn-dbg {
            grid-column: span 2; background: transparent !important;
            border: 1px solid #ff3b30 !important; color: #ff3b30 !important;
            font-size: 0.65rem !important; padding: 7px 0 !important;
        }
        .btn-dbg:active { transform: none !important; }

        .guide-screen {
            background: #000; border-radius: 10px; padding: 9px;
            border: 2px solid #2c2c2e; max-height: 170px; overflow-y: auto;
        }
        .guide-title {
            color: #0a84ff; font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid #1a1a1a; padding-bottom: 5px;
        }
        .pl-item {
            padding: 5px 7px; margin: 3px 0; border-radius: 4px; cursor: pointer;
            font-size: 0.68rem; display: flex; align-items: center; gap: 7px;
            color: #8e8e93; font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
        }
        .pl-item:hover   { color: #fff; background: rgba(255,255,255,0.07); }
        .pl-item.current { color: #32d74b; background: rgba(50,215,75,0.07); }
        .badge { font-size: 0.55rem; padding: 2px 5px; border-radius: 3px; color: #fff; flex-shrink: 0; }
        .badge-yt { background: #ff3b30; }
        .badge-dm { background: #0a84ff; }
        .guide-screen::-webkit-scrollbar { width: 3px; }
        .guide-screen::-webkit-scrollbar-thumb { background: #2a2a2a; }
    </style>
</head>
<body>

<div id="transition-overlay"></div>

<div id="debug-console">
    <div id="dbg-hdr" onclick="toggleDbg()">
        ⚠ DEBUG — YT API + DM iframe
        <span id="dbg-hint">[ collapse ]</span>
    </div>
    <div id="dbg-body"></div>
</div>

<div class="player-container">
    <div id="player-mount"></div>
</div>

<div class="branding">
    <div class="live-dot"></div>
    <h3>Euboean TV</h3>
</div>

<div id="video-status">CH 01 // SYNCING...</div>

<div id="remote-control">
    <div class="remote-header">Universal Remote</div>
    <div class="remote-controls">
        <button class="btn-ch" onclick="changeVideo(-1)">CH −</button>
        <button class="btn-ch" onclick="changeVideo(1)">CH +</button>
        <button class="btn-2"  id="btn-playpause" onclick="togglePlayPause()" disabled>▶ / ⏸</button>
        <button class="btn-2"  id="btn-mute"      onclick="toggleMute()"      disabled>UNMUTE</button>
        <button class="btn-2"  onclick="toggleFullscreen()">FULLSCREEN</button>
        <button class="btn-dbg" onclick="toggleDbg()">⚠ DEBUG LOG</button>
    </div>
    <div class="guide-screen">
        <div class="guide-title">Programme Guide</div>
        <div id="pl-items"></div>
    </div>
</div>

<div class="newsBarContainer">
    <div class="ticker-label">BREAKING</div>
    <div class="ticker-track">
        <div id="newsScroller">Loading…</div>
    </div>
</div>

<script>
// ============================================================================
// 1. DEBUG LOGGING SYSTEM
// ============================================================================
var _dbgCollapsed = false;
function toggleDbg() {
    _dbgCollapsed = !_dbgCollapsed;
    document.getElementById('debug-console').classList.toggle('collapsed', _dbgCollapsed);
    document.getElementById('dbg-hint').textContent = _dbgCollapsed ? '[ expand ]' : '[ collapse ]';
}
function dbg(msg, level) {
    level = level || 'info';
    var b = document.getElementById('dbg-body'); if (!b) return;
    var ts = new Date().toTimeString().slice(0,8);
    var r  = document.createElement('div'); r.className = 'dl ' + level;
    r.innerHTML = '<span class="dt">' + ts + '</span>'
                + '<span class="dm">' + String(msg).replace(/</g,'&lt;') + '</span>';
    b.appendChild(r); b.scrollTop = b.scrollHeight;
    if (level === 'error') console.error(msg);
    else if (level === 'warn') console.warn(msg);
    else console.log(msg);
}
window.addEventListener('error',              function(e){ dbg('UNCAUGHT: ' + e.message, 'error'); });
window.addEventListener('unhandledrejection', function(e){ dbg('PROMISE: ' + (e.reason && e.reason.message || e.reason), 'error'); });

// ============================================================================
// 2. PLAYLIST MANAGEMENT
// ============================================================================
// UPDATED FALLBACK – now matches legit.html
var FALLBACK = [
    { id: '5v3Zq84YQ6I', type: 'yt' },
    { id: '11qXS8bXdsc', type: 'yt' },
    { id: 'x6cxefe',     type: 'dm' },
    { id: '7263YsyaDBc', type: 'yt' },
    { id: 'PelzSnmwQ-M', type: 'yt' },
    { id: 'x7z8t1c',     type: 'dm' },
    { id: 'lmVAb_7vzYA', type: 'yt' },
    { id: 'w7k5xPIpuN0', type: 'yt' },
    { id: 'wyVTQdW3d_Q', type: 'yt' },
    { id: 'RVWadttGEPM', type: 'yt' },
    { id: '6aM2IvVudxM', type: 'yt' },
    { id: 'PyLNiOkzyRU', type: 'yt' },
    { id: 'FGWICvtZn74', type: 'yt' },
    { id: 'QWs56m8QniI', type: 'yt' },
    { id: '0URH98uvG7w', type: 'yt' }
];
var playlist  = FALLBACK;
var _chParam  = parseInt(new URLSearchParams(window.location.search).get('ch') || '0');
var idx       = isNaN(_chParam) ? 0 : Math.max(0, _chParam);

async function loadPlaylist() {
    try {
        dbg('Fetching playlist from admin.html…');
        var res = await fetch('admin.html?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var html = await res.text();
        var m = html.match(/window\.__EUBOEAN_PLAYLIST__\s*=\s*(\[[\s\S]*?\]);/);
        if (!m) throw new Error('Marker not found');
        var pl = JSON.parse(m[1]);
        dbg('Playlist OK: ' + pl.length + ' items', 'info');
        return pl;
    } catch(e) {
        dbg('Playlist failed: ' + e.message + ' — using updated fallback', 'warn');
        return FALLBACK;  // now returns the new 15-item list
    }
}

// ============================================================================
// 3. YOUTUBE API LOADER (mirrors legit.html)
// ============================================================================
var _ytApiReady = null;
function loadYouTubeAPI() {
    if (_ytApiReady) return _ytApiReady;
    _ytApiReady = new Promise(function(resolve) {
        if (window.YT && window.YT.Player) {
            resolve();
            return;
        }
        window.onYouTubeIframeAPIReady = resolve;
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
    });
    return _ytApiReady;
}

// ============================================================================
// 4. GLOBAL STATE
// ============================================================================
var youtubePlayer = null;   // only defined when current type is 'yt'
var isMuted = true;         // start muted for autoplay

// ============================================================================
// 5. REMOTE CONTROLS & UI FADING
// ============================================================================
function updateYTButtons() {
    var ppBtn   = document.getElementById('btn-playpause');
    var muteBtn = document.getElementById('btn-mute');
    if (!ppBtn || !muteBtn) return;
    if (!youtubePlayer) {
        ppBtn.disabled   = true;
        muteBtn.disabled = true;
        ppBtn.textContent   = '▶ / ⏸';
        muteBtn.textContent = 'UNMUTE';
        return;
    }
    ppBtn.disabled   = false;
    muteBtn.disabled = false;
    var state = youtubePlayer.getPlayerState && youtubePlayer.getPlayerState();
    ppBtn.textContent   = (state === YT.PlayerState.PLAYING) ? 'PAUSE' : 'PLAY';
    muteBtn.textContent = isMuted ? 'UNMUTE' : 'MUTE';
}

function togglePlayPause() {
    if (!youtubePlayer) return;
    var state = youtubePlayer.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
        youtubePlayer.pauseVideo();
    } else {
        youtubePlayer.playVideo();
    }
}

function toggleMute() {
    if (!youtubePlayer) return;
    isMuted = !isMuted;
    if (isMuted) youtubePlayer.mute(); else youtubePlayer.unMute();
    updateYTButtons();
}

function changeVideo(dir) {
    idx = (idx + dir + playlist.length) % playlist.length;
    loadVideo();
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen && document.exitFullscreen();
    }
}

var _fadeTimer = null;
function resetFade() {
    document.body.classList.remove('ui-faded');
    clearTimeout(_fadeTimer);
    _fadeTimer = setTimeout(function(){ document.body.classList.add('ui-faded'); }, 4000);
}
document.addEventListener('mousemove', resetFade);
document.addEventListener('click',     resetFade);

// ============================================================================
// 6. PROGRAMME GUIDE & STATUS
// ============================================================================
function renderGuide() {
    var c = document.getElementById('pl-items'); if (!c) return;
    c.innerHTML = playlist.map(function(item, i) {
        return '<div class="pl-item ' + (i === idx ? 'current' : '') + '" data-i="' + i + '">'
             + '<span class="badge badge-' + item.type + '">' + item.type.toUpperCase() + '</span>'
             + 'CH' + String(i+1).padStart(2,'0') + ' — ' + item.id
             + '</div>';
    }).join('');
    c.querySelectorAll('.pl-item').forEach(function(el) {
        el.addEventListener('click', function(){ idx = +el.dataset.i; loadVideo(); });
    });
}

function setStatus(msg) {
    var el = document.getElementById('video-status'); if (el) el.textContent = msg;
}

// ============================================================================
// 7. NEWS TICKER INIT
// ============================================================================
function initNews() {
    dbg('Fetching RSS…');
    fetch('https://corsproxy.io/?' + encodeURIComponent('https://www.news.gr/rss.ashx'))
        .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function(str) {
            var xml = new DOMParser().parseFromString(str, 'text/xml');
            var items = xml.querySelectorAll('item');
            if (!items.length) throw new Error('0 items');
            var html = '';
            items.forEach(function(el, i) {
                if (i < 12) { var t = el.querySelector('title'); if (t) html += '<span style="margin-right:80px">✦ ' + t.textContent + '</span>'; }
            });
            var s = document.getElementById('newsScroller');
            s.innerHTML = html + html;
            dbg('RSS OK — ' + items.length + ' items');
            setTimeout(function(){ s.style.animationPlayState = 'running'; }, 1200);
        })
        .catch(function(e) {
            dbg('RSS: ' + e.message, 'warn');
            var s  = document.getElementById('newsScroller');
            var fb = ['Euboean TV — Live','Independent Broadcast','No algorithms','No paywalls']
                .map(function(t){ return '<span style="margin-right:80px">✦ ' + t + '</span>'; }).join('');
            s.innerHTML = fb + fb;
            setTimeout(function(){ s.style.animationPlayState = 'running'; }, 1200);
        });
}

// ============================================================================
// 8. CORE PLAYER LOGIC – adapted from legit.html
// ============================================================================
function buildDMSrc(id) {
    return 'https://geo.dailymotion.com/player.html?video=' + id + '&autoplay=1&mute=1';
}

async function loadVideo() {
    var item = playlist[idx];
    if (!item) { dbg('No item at idx ' + idx, 'error'); return; }

    dbg('→ CH' + (idx+1) + ' [' + item.type + '] ' + item.id);
    setStatus('CH ' + String(idx+1).padStart(2,'0') + ' // ' + item.type.toUpperCase() + ': ' + item.id);

    // Transition flash
    var ov = document.getElementById('transition-overlay');
    ov.style.opacity = '1';

    // Cleanup previous YouTube player
    if (youtubePlayer) {
        try { youtubePlayer.destroy(); } catch(e) {}
        youtubePlayer = null;
    }

    var mount = document.getElementById('player-mount');
    mount.innerHTML = '';
    updateYTButtons();
    renderGuide();
    resetFade();

    // Let flash show briefly
    await new Promise(function(r){ setTimeout(r, 180); });
    ov.style.opacity = '0';

    if (item.type === 'yt') {
        // --- YOUTUBE (identical to legit.html) ---
        await loadYouTubeAPI();

        var playerDiv = document.createElement('div');
        playerDiv.id = 'yt-player-div';
        mount.appendChild(playerDiv);

        dbg('Creating YT.Player for ' + item.id, 'info');

        youtubePlayer = new YT.Player('yt-player-div', {
            height: '100%',
            width:  '100%',
            videoId: item.id,
            playerVars: {
                autoplay:        1,
                mute:            isMuted ? 1 : 0,
                controls:        0,
                rel:             0,
                modestbranding:  1,
                iv_load_policy:  3,
                playsinline:     1,
                disablekb:       1
            },
            events: {
                'onReady': function(e) {
                    dbg('YT.Player ready ✓', 'info');
                    // Ensure mute state matches isMuted
                    if (isMuted) e.target.mute(); else e.target.unMute();
                    updateYTButtons();
                },
                'onStateChange': function(e) {
                    updateYTButtons();
                    if (e.data === YT.PlayerState.ENDED) {
                        dbg('YT ended → next', 'event');
                        var transOv = document.getElementById('transition-overlay');
                        transOv.style.opacity = '1';
                        setTimeout(function() {
                            idx = (idx + 1) % playlist.length;
                            loadVideo();
                            setTimeout(function(){ transOv.style.opacity = '0'; }, 500);
                        }, 800);
                    }
                },
                'onError': function(e) {
                    dbg('YT.Player error code ' + e.data + ' — skipping to next', 'error');
                    // Skip to next video instead of redirecting
                    var transOv = document.getElementById('transition-overlay');
                    transOv.style.opacity = '1';
                    setTimeout(function() {
                        idx = (idx + 1) % playlist.length;
                        loadVideo();
                        setTimeout(function(){ transOv.style.opacity = '0'; }, 500);
                    }, 1000);
                }
            }
        });
    } else {
        // --- DAILYMOTION (simple iframe) ---
        var iframe = document.createElement('iframe');
        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
        iframe.setAttribute('title', 'DM — ' + item.id);
        iframe.src = buildDMSrc(item.id);
        mount.appendChild(iframe);
        dbg('DM iframe → ' + iframe.src, 'info');
    }
}

// ============================================================================
// 9. INITIALIZATION
// ============================================================================
window.onload = async function() {
    dbg('=== EUBOEAN TV — FIXED YT HANDLING ===', 'info');
    dbg('Protocol : ' + window.location.protocol);
    dbg('Origin   : ' + window.location.origin);

    if (_chParam > 0) dbg('Resumed at CH' + (_chParam+1), 'warn');
    if (window.location.protocol === 'file:') {
        dbg('⚠ FILE:// — YouTube iframes blocked by browsers. Upload to a web host.', 'warn');
    }

    playlist = await loadPlaylist();  // will use updated fallback if fetch fails
    idx = Math.min(idx, playlist.length - 1);

    renderGuide();
    initNews();
    resetFade();
    loadVideo();
};
</script>
</body>
</html>
